<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
     
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="flex items-center justify-between px-10 py-4 bg-[#f1f1f1] border-b border-gray-200">
        
        <div class="flex items-center gap-12">
            <div class="flex items-center justify-center w-12 h-12 bg-black rounded-full overflow-hidden">
                <span class="text-white font-bold text-lg tracking-tighter">18</span>
            </div>

            <div class="hidden md:flex items-center gap-8 text-[15px] text-gray-700 font-medium">
                <a class="hover:text-black transition-colors">About us</a>
                <a class="hover:text-black transition-colors">How it works</a>
                <a class="hover:text-black transition-colors">Pricing</a>
                <a class="hover:text-black transition-colors">FAQs</a>
            </div>
        </div>

        <div class="flex items-center gap-8 text-[15px]">
            <a class="text-gray-700 font-medium hover:text-black transition-colors">Login</a>
            <a class="bg-[#121212] text-white px-8 py-3 font-medium  ">
                Sign Up
            </a>
        </div>

    </nav>

    <section class="flex flex-col md:flex-row items-center justify-between px-10 py-16 md:py-24 bg-[#f1f1f1] min-h-[80vh]">
    
    <div class="max-w-2xl">
        <h1 class="text-5xl md:text-7xl font-normal leading-tight tracking-tight text-black mb-8   p-2">
            Always Track & <br>
            Analyze Your Business <br>
            Statistics To Succeed.
        </h1>

        <p class="text-gray-600 text-lg mb-10 max-w-lg leading-relaxed">
            A better way to manage your sales, team, clients & marketing — 
            on a single platform. Powerful, affordable & easy.
        </p>

        <div class="flex items-center mb-16">
            <input type="email" placeholder="Enter your email" 
                class="px-6 py-4 w-64 md:w-80 border border-gray-300 focus:outline-none focus:border-black transition-all bg-white">
            <button class="bg-[#1a1a1a] text-white px-8 py-4 font-medium hover:bg-black transition-all">
                Get started
            </button>
        </div>

        <div class="flex items-center gap-8 grayscale opacity-70">
            <span class="font-bold italic text-2xl text-black">VISA</span>
            <div class="flex items-center gap-1">
                <div class="w-6 h-6 bg-gray-600 rounded-full opacity-50"></div>
                <div class="w-6 h-6 bg-gray-800 rounded-full -ml-3"></div>
            </div>
            <span class="font-bold text-xl text-black flex items-center gap-1">
                <span class="text-blue-900">P</span>ayPal
            </span>
        </div>
    </div>

    <div class="mt-12 md:mt-0 w-full md:w-1/2 flex justify-center relative">
        <img src="" alt="" class="max-w-1200 h-auto">
        
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            </div>
    </div>

</section>
   

</body>
</html>
